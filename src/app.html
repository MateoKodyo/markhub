<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// PLAN-THEMING §STEP 5 — pre-hydration theme application.
			// Runs synchronously before the first paint so the user never sees a
			// flash of the wrong theme. Reads the last resolved theme from
			// localStorage (written by themeManager on every change); falls back
			// to the OS preference; final fallback is markhub-dark (the default
			// signature theme — the `markhub-*` ids are kept on purpose).
			(function () {
				try {
					// New key is `markus.theme.cache`; fall back to the legacy
					// `markhub.theme.cache` so the first boot after the rename
					// doesn't flash the wrong theme before the store migrates it.
					var cached =
						localStorage.getItem('markus.theme.cache') ||
						localStorage.getItem('markhub.theme.cache');
					var known = [
						'markhub-light',
						'markhub-dark',
						'forest',
						'kodyo',
						'sage',
						'terminal',
						'editor',
						'terracotta',
						'rose',
						'amber',
						'ink',
						'plum'
					];
					if (cached && known.indexOf(cached) >= 0) {
						document.documentElement.setAttribute('data-theme', cached);
						return;
					}
				} catch (e) {
					/* localStorage unavailable — ignore and fall through */
				}
				var prefersDark =
					typeof window.matchMedia === 'function' &&
					window.matchMedia('(prefers-color-scheme: dark)').matches;
				document.documentElement.setAttribute(
					'data-theme',
					prefersDark ? 'markhub-dark' : 'markhub-light'
				);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
